<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-gray-900">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-gray-900">vieclamtudo.</h1>
            <a href="dang-ky.html" class="text-sm font-medium bg-gray-900 text-white px-5 py-2 rounded-full hover:bg-gray-800 transition-colors">
                Trở thành đối tác
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-5 py-10">
        
        <div class="mb-12">
            <h2 class="text-3xl font-semibold tracking-tight text-gray-900 mb-6">Khám phá chuyên gia tự do</h2>
            
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Tìm kiếm dịch vụ, kỹ năng..." 
                           class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-900 focus:ring-1 focus:ring-gray-900 transition">
                </div>
                <select id="jobFilter" onchange="filterData()" class="py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 outline-none focus:border-gray-900 transition appearance-none">
                    <option value="">Tất cả lĩnh vực</option>
                </select>
                <select id="provinceFilter" onchange="filterData()" class="py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 outline-none focus:border-gray-900 transition appearance-none">
                    <option value="">Toàn quốc</option>
                </select>
            </div>
        </div>

        <div id="workerGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-4 gap-y-10">
            </div>

    </main>

    <a href="https://zalo.me/0909108890" target="_blank" class="fixed bottom-6 right-6 bg-white border border-gray-200 text-gray-800 w-12 h-12 rounded-full shadow-sm flex items-center justify-center hover:bg-gray-50 transition">
        <i class="fa-solid fa-message text-lg"></i>
    </a>

    <div id="detailModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl relative scroll-smooth hide-scroll">
            <button onclick="closeModal()" class="sticky top-4 float-right mr-4 bg-gray-100 text-gray-500 w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-200 transition z-10">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modalBody" class="p-8"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            databaseURL: "https://vieclamtudo-7a146-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        let workers = [];

        async function init() {
            const [jobs, provs] = await Promise.all([
                getDocs(collection(db, "jobs")),
                getDocs(collection(db, "provinces"))
            ]);
            
            jobs.forEach(d => document.getElementById('jobFilter').innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
            provs.forEach(d => document.getElementById('provinceFilter').innerHTML += `<option value="${d.id}">${d.data().name}</option>`);

            const snap = await getDocs(collection(db, "workers"));
            workers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render(workers);
        }

        function render(data) {
            const grid = document.getElementById('workerGrid');
            if(data.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 text-sm col-span-full">Không tìm thấy kết quả.</p>`;
                return;
            }
            grid.innerHTML = data.map(w => `
                <div onclick="openModal('${w.id}')" class="group cursor-pointer">
                    <div class="aspect-[9/16] bg-gray-100 rounded-2xl overflow-hidden mb-3 relative">
                        <img src="${w.avatar || 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&q=80'}" class="object-cover w-full h-full group-hover:scale-105 transition duration-500">
                        <div class="absolute bottom-3 left-3 bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg text-xs font-semibold text-gray-800 flex items-center gap-1 shadow-sm" id="rate-${w.id}">
                            <i class="fa-solid fa-star text-yellow-500 text-[10px]"></i> Mới
                        </div>
                    </div>
                    <h3 class="font-semibold text-gray-900 text-base leading-snug">${w.fullname}</h3>
                    <p class="text-sm text-gray-500 mt-0.5 truncate">${w.birth} • ${w.last_location || 'Toàn quốc'}</p>
                </div>
            `).join('');
            data.forEach(w => syncRate(w.id));
        }

        function syncRate(id) {
            onValue(ref(rtdb, 'ratings/' + id), (s) => {
                const vals = s.val();
                if(vals) {
                    const arr = Object.values(vals);
                    const avg = (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);
                    const el = document.getElementById(`rate-${id}`);
                    if(el) el.innerHTML = `<i class="fa-solid fa-star text-yellow-500 text-[10px]"></i> ${avg}`;
                }
            });
        }

        window.openModal = (id) => {
            const w = workers.find(x => x.id === id);
            document.getElementById('modalBody').innerHTML = `
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="w-full md:w-1/2 aspect-[9/16] bg-gray-100 rounded-2xl overflow-hidden">
                        <img src="${w.avatar || 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&q=80'}" class="w-full h-full object-cover">
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col justify-center">
                        <h2 class="text-3xl font-bold text-gray-900">${w.fullname}</h2>
                        <div class="flex gap-4 mt-3 text-sm text-gray-500">
                            <span>Năm sinh: ${w.birth}</span>
                            <span>Giới tính: ${w.gender}</span>
                        </div>
                        <div class="flex gap-4 mt-1 text-sm text-gray-500">
                            <span>Cao: ${w.height || '--'}</span>
                            <span>Nặng: ${w.weight || '--'}</span>
                        </div>
                        
                        <div class="mt-6">
                            <h3 class="text-sm font-semibold text-gray-900 mb-1">Mô tả & Kinh nghiệm</h3>
                            <p class="text-sm text-gray-600 leading-relaxed">${w.exp || 'Chưa cập nhật thông tin.'}</p>
                        </div>

                        <div class="mt-6 border-t border-gray-100 pt-6">
                            <h3 class="text-sm font-semibold text-gray-900 mb-1">Thù lao & Thời gian</h3>
                            <p class="text-2xl font-semibold text-gray-900">${w.expected_salary || 'Thỏa thuận'}</p>
                            <p class="text-sm text-gray-500 mt-1">${w.working_time || 'Thời gian linh hoạt'}</p>
                        </div>
                    </div>
                </div>

                <div class="mt-10">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Dịch vụ cung cấp</h3>
                    <div class="space-y-2">
                        ${w.services ? w.services.map(s => `
                            <div class="flex justify-between items-center py-3 border-b border-gray-100 last:border-0">
                                <span class="text-sm font-medium text-gray-800">${s.title}</span>
                                <span class="text-sm font-semibold text-gray-900">${Number(s.price).toLocaleString()}đ</span>
                            </div>
                        `).join('') : '<p class="text-sm text-gray-500">Chưa có bảng giá dịch vụ.</p>'}
                    </div>
                </div>

                <div class="mt-10 flex gap-3">
                    <a href="https://zalo.me/${w.phone}" target="_blank" class="flex-1 bg-gray-900 text-white py-3 rounded-xl text-center text-sm font-medium hover:bg-gray-800 transition">
                        Liên hệ công việc
                    </a>
                    <button onclick="report('${id}')" class="px-6 py-3 bg-gray-50 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-100 transition">
                        Báo cáo
                    </button>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-100 flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-900">Đánh giá người này</span>
                    <div class="flex gap-2">
                        ${[1,2,3,4,5].map(n => `<button onclick="vote('${id}', ${n})" class="w-8 h-8 rounded-full border border-gray-200 text-xs font-medium hover:border-gray-900 transition">${n}</button>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        window.closeModal = () => document.getElementById('detailModal').classList.add('hidden');
        window.vote = (id, n) => { push(ref(rtdb, 'ratings/' + id), n); alert("Đã gửi đánh giá."); };
        window.report = (id) => alert("Đã gửi báo cáo.");

        window.filterData = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const j = document.getElementById('jobFilter').value;
            const p = document.getElementById('provinceFilter').value;
            const filtered = workers.filter(w => {
                const searchTxt = (w.fullname + (w.exp || '')).toLowerCase();
                return searchTxt.includes(s) && (j ? w.job_id === j : true) && (p ? w.province_id === p : true);
            });
            render(filtered);
        }

        init();
    </script>
</body>
</html>
