<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Dữ Liệu Đợt 5 - Hoàn Tất 100 Nghề</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-red-100">
        <h2 class="text-xl font-black text-red-700 mb-6 uppercase">Nạp Dữ Liệu Đợt 5 (Nghề 81 - 100)</h2>
        
        <div id="log" class="text-[11px] bg-slate-900 text-green-400 p-4 rounded-xl h-64 overflow-y-auto mb-6 font-mono border border-slate-800 shadow-inner">
            > Chờ nhấn nút để hoàn tất 100 nghề...
        </div>

        <button onclick="runSetupDot5()" id="btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center gap-2">
             BẮT ĐẦU NẠP ĐỢT CUỐI
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            messagingSenderId: "659703475018",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DANH SÁCH 20 NGHỀ CUỐI CÙNG (ĐỢT 5 - NÔNG NGHIỆP, THỦ CÔNG & CÔNG NGHIỆP)
        const jobsDot5 = [
            {id: 'thiet-ke-san-vuon', name: 'Thiết kế sân vườn/Tiểu cảnh'},
            {id: 'lap-he-thong-tuoi', name: 'Lắp hệ thống tưới tự động'},
            {id: 'cat-co-phat-hoang', name: 'Cắt cỏ/Phát hoang mặt bằng'},
            {id: 'uon-cay-kieng', name: 'Nghệ nhân uốn cây kiểng/Bonsai'},
            {id: 'nuoi-trong-thuy-san', name: 'Tư vấn nuôi trồng thủy sản'},
            {id: 'sua-may-nong-nghiep', name: 'Sửa máy cày/Máy cắt lúa'},
            {id: 'dan-lat-thu-cong', name: 'Đan lát/Thủ công mỹ nghệ'},
            {id: 'cham-khac-go', name: 'Thợ chạm khắc gỗ/Đồ mỹ nghệ'},
            {id: 'duc-tuong-da', name: 'Thợ đúc tượng/Điêu khắc đá'},
            {id: 'lam-banh-truyen-thong', name: 'Làm bánh truyền thống theo yêu cầu'},
            {id: 'rang-xay-cafe', name: 'Rang xay cà phê thủ công'},
            {id: 'uop-tra-thao-moc', name: 'Ướp trà/Thảo mộc gia truyền'},
            {id: 'sua-thiet-bi-may', name: 'Sửa máy may công nghiệp'},
            {id: 'bao-tri-thang-may', name: 'Bảo trì thang máy gia đình'},
            {id: 've-sinh-ong-khoi', name: 'Vệ sinh ống khói/Hệ thống bếp'},
            {id: 'lap-cach-am', name: 'Thi công cách âm/Phòng hát'},
            {id: 'sua-can-dien-tu', name: 'Sửa cân điện tử/Thiết bị đo'},
            {id: 'thue-do-bao-ho', name: 'Cho thuê đồ bảo hộ/Thiết bị xây dựng'},
            {id: 'dao-gieng-khoan', name: 'Thợ đào giếng/Khoan giếng'},
            {id: 'xe-om-cong-nghe-tu-do', name: 'Tài xế chở khách đường dài'}
        ];

        window.runSetupDot5 = async () => {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log.innerHTML += `<p>> Đang nạp đợt cuối (Nông nghiệp & Thủ công)...</p>`;

            try {
                for (let j of jobsDot5) {
                    await setDoc(doc(db, "jobs", j.id), j);
                    log.innerHTML += `<p>> Đã nạp: ${j.name}</p>`;
                    log.scrollTop = log.scrollHeight;
                }

                log.innerHTML += `<p class="text-blue-400 font-bold">> CHÚC MỪNG! ĐÃ HOÀN TẤT 100 NGÀNH NGHỀ.</p>`;
                btn.innerText = "HOÀN TẤT 100 NGHỀ";
            } catch (error) {
                log.innerHTML += `<p class="text-red-500">> Lỗi: ${error.message}</p>`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
