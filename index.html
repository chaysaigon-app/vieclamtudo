<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Dữ Liệu Đợt 4 - Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-purple-100">
        <h2 class="text-xl font-black text-purple-700 mb-6 uppercase">Nạp Dữ Liệu Đợt 4 (Nghề 61 - 80)</h2>
        
        <div id="log" class="text-[11px] bg-slate-900 text-green-400 p-4 rounded-xl h-64 overflow-y-auto mb-6 font-mono border border-slate-800 shadow-inner">
            > Chờ nhấn nút để nạp đợt 4...
        </div>

        <button onclick="runSetupDot4()" id="btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center gap-2">
             BẮT ĐẦU NẠP ĐỢT 4
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            messagingSenderId: "659703475018",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DANH SÁCH 20 NGHỀ TIẾP THEO (ĐỢT 4 - VĂN PHÒNG & SÁNG TẠO)
        const jobsDot4 = [
            {id: 'thiet-ke-menu', name: 'Thiết kế Menu/Bảng hiệu'},
            {id: 'viet-bai-content', name: 'Viết bài/Nội dung thuê'},
            {id: 'nhap-lieu-pc', name: 'Nhập liệu máy tính'},
            {id: 'dich-thuat-tu-do', name: 'Dịch thuật tài liệu'},
            {id: 'video-editor', name: 'Cắt ghép/Chỉnh video'},
            {id: 'admin-fanpage', name: 'Quản trị Fanpage/Zalo'},
            {id: 'ads-optimization', name: 'Chạy quảng cáo giá rẻ'},
            {id: 'ai-artist', name: 'Tạo hình ảnh bằng AI'},
            {id: 'phat-to-roi-thue', name: 'Phát tờ rơi/Quảng cáo'},
            {id: 'treo-banner', name: 'Treo băng rôn/Banner'},
            {id: 'pg-pb-event', name: 'Cung cấp PG/PB sự kiện'},
            {id: 'mc-event', name: 'MC dẫn chương trình'},
            {id: 'nhac-cong-party', name: 'Nhạc công đám tiệc'},
            {id: 'thue-xe-lai', name: 'Cho thuê xe tự lái'},
            {id: 'google-map-review', name: 'Tăng đánh giá Google Map'},
            {id: 'telesale-thue', name: 'Gọi điện bán hàng thuê'},
            {id: 'ke-toan-thue', name: 'Làm sổ sách kế toán'},
            {id: 'tu-van-luat', name: 'Tư vấn pháp lý tự do'},
            {id: 'sale-freelancer', name: 'Nhân viên bán hàng thuê'},
            {id: 'giu-xe-event', name: 'Bảo vệ/Giữ xe sự kiện'}
        ];

        window.runSetupDot4 = async () => {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log.innerHTML += `<p>> Đang nạp đợt 4 (Văn phòng & Sáng tạo)...</p>`;

            try {
                for (let j of jobsDot4) {
                    await setDoc(doc(db, "jobs", j.id), j);
                    log.innerHTML += `<p>> Đã nạp: ${j.name}</p>`;
                    log.scrollTop = log.scrollHeight;
                }

                log.innerHTML += `<p class="text-blue-400 font-bold">> HOÀN TẤT ĐỢT 4 (80/100 NGHỀ)!</p>`;
                btn.innerText = "XONG ĐỢT 4";
            } catch (error) {
                log.innerHTML += `<p class="text-red-500">> Lỗi: ${error.message}</p>`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
