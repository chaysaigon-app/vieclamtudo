<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Dữ Liệu Đợt 2 - Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-xl font-black text-blue-800 mb-6 uppercase">Nạp Dữ Liệu Đợt 2 (Nghề 21 - 40)</h2>
        
        <div id="log" class="text-[11px] bg-slate-900 text-green-400 p-4 rounded-xl h-64 overflow-y-auto mb-6 font-mono border border-slate-800 shadow-inner">
            > Chờ nhấn nút để nạp đợt 2...
        </div>

        <button onclick="runSetupDot2()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center gap-2">
             BẮT ĐẦU NẠP ĐỢT 2
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            messagingSenderId: "659703475018",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DANH SÁCH 20 NGHỀ TIẾP THEO (ĐỢT 2 - KHÔNG TRÙNG ĐỢT 1)
        const jobsDot2 = [
            {id: 'sua-giay', name: 'Sửa giày dép/Túi xách'},
            {id: 'may-va', name: 'Sửa quần áo tận nơi'},
            {id: 've-sinh-sofa', name: 'Giặt Sofa/Nệm/Rèm'},
            {id: 'mai-dao', name: 'Thợ mài dao kéo'},
            {id: 'di-cho-ho', name: 'Đi chợ hộ/Mua sắm'},
            {id: 'cham-nguoi-gia', name: 'Chăm sóc người già'},
            {id: 'trang-tri-tiec', name: 'Trang trí tiệc/Hoa tươi'},
            {id: 'rua-xe-tai-nha', name: 'Rửa xe tại nhà'},
            {id: 'giat-ui', name: 'Giặt ủi giao tận nơi'},
            {id: 'sua-tivi', name: 'Sửa Tivi/Loa đài'},
            {id: 'thong-tac-bon-cau', name: 'Thông tắc bồn cầu'},
            {id: 'diet-moi', name: 'Diệt mối/Côn trùng'},
            {id: 'khoan-cat-be-tong', name: 'Khoan cắt bê tông'},
            {id: 'han-xi', name: 'Thợ hàn sắt/Inox'},
            {id: 'son-cua-sat', name: 'Sơn cửa sắt/Hàng rào'},
            {id: 've-sinh-be-nuoc', name: 'Vệ sinh bể nước/Bồn'},
            {id: 'lap-rem-cua', name: 'Lắp rèm cửa/Màn'},
            {id: 'sua-bep-gas', name: 'Sửa bếp Gas/Bếp từ'},
            {id: 'thong-gio', name: 'Vệ sinh quạt thông gió'},
            {id: 'lap-chuong-cua', name: 'Lắp chuông cửa/Khóa số'}
        ];

        window.runSetupDot2 = async () => {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log.innerHTML += `<p>> Đang nạp 20 nghề tiếp theo...</p>`;

            try {
                for (let j of jobsDot2) {
                    await setDoc(doc(db, "jobs", j.id), j);
                    log.innerHTML += `<p>> Đã nạp: ${j.name}</p>`;
                    log.scrollTop = log.scrollHeight;
                }

                log.innerHTML += `<p class="text-blue-400 font-bold">> HOÀN TẤT ĐỢT 2 (40/100 NGHỀ)!</p>`;
                btn.innerText = "XONG ĐỢT 2";
            } catch (error) {
                log.innerHTML += `<p class="text-red-500">> Lỗi: ${error.message}</p>`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
