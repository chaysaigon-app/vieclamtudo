<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Chi Tiết Nhân Sự - Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-blue-100">
        <h2 class="text-xl font-black text-blue-800 mb-6 uppercase text-center">Cập Nhật Thể Hình & Địa Điểm</h2>
        
        <div id="log" class="text-[11px] bg-slate-900 text-green-400 p-4 rounded-xl h-64 overflow-y-auto mb-6 font-mono border border-slate-800 shadow-inner">
            > Chờ nạp hồ sơ nhân sự đầy đủ thông tin...
        </div>

        <button onclick="runWorkerUpdate()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center gap-2">
             BẮT ĐẦU CẬP NHẬT NHÂN SỰ
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            messagingSenderId: "659703475018",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.runWorkerUpdate = async () => {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log.innerHTML += `<p>> Đang nạp nhân sự mẫu đầy đủ thông tin thể hình...</p>`;

            try {
                // HỒ SƠ NHÂN SỰ ĐẦY ĐỦ CÁC TRƯỜNG MỚI
                const worker = {
                    fullname: "Trần Anh Quân",
                    gender: "Nam",              // Giới tính
                    height: "175cm",            // Chiều cao
                    weight: "70kg",             // Cân nặng
                    phone: "0909108890",
                    birth: 1992,
                    health: "Tốt",
                    family: "Ổn định",
                    job_id: "sua-lanh",
                    province_id: "hc",
                    last_location: "Quận 1, TP. HCM", // Địa điểm làm việc gần nhất
                    exp: "12 năm",
                    services: [
                        { title: "Vệ sinh máy lạnh", price: 200000, unit: "bộ" },
                        { title: "Sửa board mạch", price: 450000, unit: "lần" }
                    ]
                };

                await addDoc(collection(db, "workers"), worker);
                
                log.innerHTML += `<p>> Đã nạp nhân sự: ${worker.fullname}</p>`;
                log.innerHTML += `<p class="text-blue-400 font-bold">> HOÀN TẤT CẬP NHẬT CẤU TRÚC NHÂN SỰ!</p>`;
                btn.innerText = "ĐÃ CẬP NHẬT XONG";
            } catch (error) {
                log.innerHTML += `<p class="text-red-500">> Lỗi: ${error.message}</p>`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
