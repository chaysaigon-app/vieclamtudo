<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Tỉnh Thành Đợt 1 - Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-indigo-100">
        <h2 class="text-xl font-black text-indigo-700 mb-6 uppercase text-center">Nạp Địa Phương - Đợt 1 (20 Tỉnh)</h2>
        
        <div id="log" class="text-[11px] bg-slate-900 text-green-400 p-4 rounded-xl h-64 overflow-y-auto mb-6 font-mono border border-slate-800 shadow-inner">
            > Chờ lệnh nạp 20 tỉnh đầu tiên...
        </div>

        <button onclick="runProvinceDot1()" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center gap-2">
             BẮT ĐẦU NẠP 20 TỈNH ĐẦU TIÊN
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            messagingSenderId: "659703475018",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DANH SÁCH 20 TỈNH ĐẦU TIÊN
        const provincesDot1 = [
            {id: 'ag', name: 'An Giang'}, {id: 'vt', name: 'Bà Rịa - Vũng Tàu'}, {id: 'bg', name: 'Bắc Giang'}, 
            {id: 'bk', name: 'Bắc Kạn'}, {id: 'bl', name: 'Bạc Liêu'}, {id: 'bn', name: 'Bắc Ninh'}, 
            {id: 'bt', name: 'Bến Tre'}, {id: 'bd', name: 'Bình Định'}, {id: 'bi', name: 'Bình Dương'}, 
            {id: 'bp', name: 'Bình Phước'}, {id: 'bh', name: 'Bình Thuận'}, {id: 'cm', name: 'Cà Mau'}, 
            {id: 'ct', name: 'Cần Thơ'}, {id: 'cb', name: 'Cao Bằng'}, {id: 'da', name: 'Đà Nẵng'}, 
            {id: 'dl', name: 'Đắk Lắk'}, {id: 'no', name: 'Đắk Nông'}, {id: 'db', name: 'Điện Biên'}, 
            {id: 'na', name: 'Đồng Nai'}, {id: 'dt', name: 'Đồng Tháp'}
        ];

        window.runProvinceDot1 = async () => {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log.innerHTML += `<p>> Đang nạp 20 địa phương đầu tiên...</p>`;

            try {
                for (let p of provincesDot1) {
                    await setDoc(doc(db, "provinces", p.id), p);
                    log.innerHTML += `<p>> Đã nạp: ${p.name}</p>`;
                    log.scrollTop = log.scrollHeight;
                }

                log.innerHTML += `<p class="text-blue-400 font-bold">> HOÀN TẤT ĐỢT 1 (20 TỈNH)!</p>`;
                btn.innerText = "XONG ĐỢT 1";
            } catch (error) {
                log.innerHTML += `<p class="text-red-500">> Lỗi: ${error.message}</p>`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
