<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-white text-slate-900 font-sans">

    <header class="sticky top-0 z-50 bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-3xl font-black tracking-tighter text-green-600">VIỆC LÀM TỰ DO</h1>
        
        <a href="dang-ky.html" class="bg-green-600 text-white px-8 py-3 rounded-full font-extrabold hover:bg-green-700 transition shadow-lg text-lg">
            Đăng ký đối tác
        </a>
    </header>

    <div class="bg-slate-900 text-white py-6 px-4 border-b-4 border-green-500">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-2xl md:text-4xl font-black uppercase tracking-tight leading-tight">
                KHUYẾN KHÍCH ĐĂNG KÝ ĐỐI TÁC MIỄN PHÍ — NÂNG TẦM THU NHẬP NGAY HÔM NAY!
            </h2>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-wrap gap-4 items-center">
        <span class="font-black uppercase text-sm text-slate-400">Lọc theo:</span>
        <select id="jobFilter" onchange="filterData()" class="bg-slate-100 border-2 border-slate-200 rounded-xl px-6 py-3 text-base font-bold outline-none focus:border-green-500 transition">
            <option value="">Tất cả ngành nghề</option>
        </select>
        <select id="provinceFilter" onchange="filterData()" class="bg-slate-100 border-2 border-slate-200 rounded-xl px-6 py-3 text-base font-bold outline-none focus:border-green-500 transition">
            <option value="">Toàn quốc (63 tỉnh thành)</option>
        </select>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="workerGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <a href="https://zalo.me/0909108890" target="_blank" class="fixed bottom-8 right-8 bg-[#0068ff] text-white p-5 rounded-2xl shadow-2xl hover:scale-110 transition">
        <i class="fa-solid fa-headset text-3xl"></i>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            databaseURL: "https://vieclamtudo-7a146-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        let workers = [];

        async function init() {
            try {
                const [jobs, provs] = await Promise.all([
                    getDocs(collection(db, "jobs")),
                    getDocs(collection(db, "provinces"))
                ]);
                
                const jobEl = document.getElementById('jobFilter');
                jobs.forEach(d => jobEl.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
                
                const provEl = document.getElementById('provinceFilter');
                provs.forEach(d => provEl.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);

                const snap = await getDocs(collection(db, "workers"));
                workers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(workers);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            const grid = document.getElementById('workerGrid');
            grid.innerHTML = data.map(w => `
                <div class="flex gap-6 p-5 border-2 border-slate-50 rounded-[2rem] shadow-sm hover:shadow-md transition bg-white">
                    <div class="w-2/5 aspect-[9/16] bg-slate-100 rounded-3xl overflow-hidden shadow-inner">
                        <img src="${w.avatar || 'https://via.placeholder.com/900x1600'}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="w-3/5 flex flex-col justify-between py-4">
                        <div>
                            <h3 class="font-black text-2xl text-slate-800 leading-tight">${w.fullname}</h3>
                            <p class="text-base font-bold text-slate-400 mt-2">${w.birth} • ${w.gender}</p>
                            <p class="text-sm text-green-600 font-black mt-4 uppercase tracking-tighter">
                                <i class="fa-solid fa-location-dot mr-1"></i> ${w.last_location || 'Toàn quốc'}
                            </p>
                        </div>
                        <div class="text-orange-500 text-lg font-black flex items-center gap-2" id="rate-${w.id}">
                            <i class="fa-solid fa-star"></i> 5.0
                        </div>
                    </div>
                </div>
            `).join('');
            data.forEach(w => syncRate(w.id));
        }

        function syncRate(id) {
            onValue(ref(rtdb, 'ratings/' + id), (s) => {
                const vals = s.val();
                if(vals) {
                    const arr = Object.values(vals);
                    const avg = (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);
                    const el = document.getElementById(`rate-${id}`);
                    if(el) el.innerHTML = `<i class="fa-solid fa-star"></i> ${avg} (${arr.length})`;
                }
            });
        }

        window.filterData = () => {
            const j = document.getElementById('jobFilter').value;
            const p = document.getElementById('provinceFilter').value;
            const filtered = workers.filter(w => (j ? w.job_id === j : true) && (p ? w.province_id === p : true));
            render(filtered);
        }

        init();
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { -webkit-font-smoothing: antialiased; }
    </style>
</body>
</html>
