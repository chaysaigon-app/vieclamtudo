<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Dữ Liệu Đợt 3 - Việc Làm Tự Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-orange-100">
        <h2 class="text-xl font-black text-orange-700 mb-6 uppercase">Nạp Dữ Liệu Đợt 3 (Nghề 41 - 60)</h2>
        
        <div id="log" class="text-[11px] bg-slate-900 text-green-400 p-4 rounded-xl h-64 overflow-y-auto mb-6 font-mono border border-slate-800 shadow-inner">
            > Chờ nhấn nút để nạp đợt 3...
        </div>

        <button onclick="runSetupDot3()" id="btn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center gap-2">
             BẮT ĐẦU NẠP ĐỢT 3
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcLuvyxByZ-NXa958BEoHYlhguk4jNvr8",
            authDomain: "vieclamtudo-7a146.firebaseapp.com",
            projectId: "vieclamtudo-7a146",
            storageBucket: "vieclamtudo-7a146.firebasestorage.app",
            messagingSenderId: "659703475018",
            appId: "1:659703475018:web:f1343a8e32cc030a092fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DANH SÁCH 20 NGHỀ TIẾP THEO (ĐỢT 3 - NHÓM KỸ THUẬT & CÔNG NGHỆ)
        const jobsDot3 = [
            {id: 'sua-dien-thoai', name: 'Sửa điện thoại tận nơi'},
            {id: 'cai-phan-mem', name: 'Cài đặt phần mềm máy tính'},
            {id: 'phuc-hoi-du-lieu', name: 'Phục hồi dữ liệu ổ cứng'},
            {id: 'lap-mang-wifi', name: 'Lắp đặt/Sửa Wifi'},
            {id: 'sua-may-in', name: 'Sửa máy in/Bơm mực'},
            {id: 've-sinh-may-giat', name: 'Vệ sinh máy giặt'},
            {id: 'sua-lo-vi-song', name: 'Sửa lò vi sóng'},
            {id: 'sua-may-loc-nuoc', name: 'Sửa máy lọc nước'},
            {id: 'lap-gian-phoi', name: 'Lắp giàn phơi thông minh'},
            {id: 'chong-tham', name: 'Chống thấm tường/Trần'},
            {id: 'thay-kinh', name: 'Thay kính cửa/Bể cá'},
            {id: 'sua-xe-dien', name: 'Sửa xe đạp/máy điện'},
            {id: 'trang-tri-tet', name: 'Trang trí Tết/Lễ'},
            {id: 'cham-me-be', name: 'Chăm sóc mẹ và bé'},
            {id: 'lay-cao-rang', name: 'Lấy cao răng tại nhà'},
            {id: 'tiem-thu-cung', name: 'Tiêm phòng thú cưng'},
            {id: 'don-kho', name: 'Dọn dẹp kho bãi'},
            {id: 'smarthome', name: 'Lắp đặt nhà thông minh'},
            {id: 'sua-cua-cuon', name: 'Sửa cửa cuốn'},
            {id: 'do-dac', name: 'Đo đạc địa chính'}
        ];

        window.runSetupDot3 = async () => {
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            log.innerHTML += `<p>> Đang nạp đợt 3 (Công nghệ & Kỹ thuật)...</p>`;

            try {
                for (let j of jobsDot3) {
                    await setDoc(doc(db, "jobs", j.id), j);
                    log.innerHTML += `<p>> Đã nạp: ${j.name}</p>`;
                    log.scrollTop = log.scrollHeight;
                }

                log.innerHTML += `<p class="text-blue-400 font-bold">> HOÀN TẤT ĐỢT 3 (60/100 NGHỀ)!</p>`;
                btn.innerText = "XONG ĐỢT 3";
            } catch (error) {
                log.innerHTML += `<p class="text-red-500">> Lỗi: ${error.message}</p>`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
